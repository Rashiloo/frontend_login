<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Bienvenido</h2>
      <p>Inicia sesión para continuar</p>
    </div>
    
    <form (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="loginData.email" 
          required
          placeholder="tu@email.com"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="loginData.password" 
          required
          placeholder="•••••••"
          class="form-input"
        >
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="login-button" [disabled]="!loginData.email || !loginData.password">
        Iniciar Sesión
      </button>
    </form>
    
    <div class="login-footer">
      <p>¿No tienes cuenta? <button (click)="goToRegister()" class="register-link">Regístrate</button></p>
    </div>
  </div>
</div>
