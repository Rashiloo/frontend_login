<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h2>Crear Cuenta</h2>
      <p>Regístrate para acceder a todas las funcionalidades</p>
    </div>
    
    <form (ngSubmit)="onRegister()" class="register-form">
      <div class="form-group">
        <label for="name">Nombre Completo</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          [(ngModel)]="registerData.name" 
          required
          placeholder="Juan Pérez"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="registerData.email" 
          required
          placeholder="tu@email.com"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="registerData.password" 
          required
          placeholder="Mínimo 6 caracteres"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          [(ngModel)]="registerData.confirmPassword" 
          required
          placeholder="Repite tu contraseña"
          class="form-input"
        >
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <button type="submit" class="register-button" [disabled]="!registerData.name || !registerData.email || !registerData.password || !registerData.confirmPassword">
        Crear Cuenta
      </button>
    </form>
    
    <div class="register-footer">
      <p>¿Ya tienes cuenta? <a href="#" (click)="goToLogin()" class="login-link">Inicia Sesión</a></p>
    </div>
  </div>
</div>
