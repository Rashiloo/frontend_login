<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h2>Crear Cuenta</h2>
      <p>Regístrate para acceder a todas las funcionalidades</p>
    </div>
    
    <form class="register-form">
      <div class="form-group">
        <label for="firstName">Nombre</label>
        <input 
          type="text" 
          id="firstName" 
          name="firstName" 
          [(ngModel)]="registerData.firstName" 
          required
          placeholder="Juan"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="lastName">Apellido</label>
        <input 
          type="text" 
          id="lastName" 
          name="lastName" 
          [(ngModel)]="registerData.lastName" 
          required
          placeholder="Pérez"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="registerData.email" 
          required
          placeholder="tu@email.com"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="registerData.password" 
          required
          placeholder="Mínimo 8 caracteres"
          class="form-input"
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          [(ngModel)]="registerData.confirmPassword" 
          required
          placeholder="Repite tu contraseña"
          class="form-input"
        >
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <button type="button" (click)="onRegister()" class="register-button" [disabled]="!registerData.firstName || !registerData.lastName || !registerData.email || !registerData.password || !registerData.confirmPassword">
        Crear Cuenta
      </button>
    </form>
    
    <div class="register-footer">
      <p>¿Ya tienes cuenta? <button (click)="goToLogin()" class="login-link">Inicia Sesión</button></p>
    </div>
  </div>
</div>
